			"santi_gordito": { atk: 56, def: 46, pes: 58, hp: 53 },
			"segarro_amego": { atk: 80, def: 76, pes: 67, hp: 75 },
			"shwola": { atk: 37, def: 32, pes: 46, hp: 41 },
			"tartazo": { atk: 87, def: 84, pes: 72, hp: 90 },
			"viajes_canica": { atk: 36, def: 40, pes: 31, hp: 37 },
			"viajes_triunfador": { atk: 52, def: 46, pes: 37, hp: 41 },
			"wep": { atk: 54, def: 60, pes: 55, hp: 63 },
			"xavitos": { atk: 46, def: 47, pes: 44, hp: 50 },
            "default": { atk: 0, def: 0, pes: 0, hp: 0 }
        };

        window.state = {
            usuarios: {},
            p1: { name: "", deck: [], hand: [], active: null, bajas: 0 },
            p2: { name: "", deck: [], hand: [], active: null, bajas: 0 },
            fase: "menu",
            turno: 1,
            ganador: null,
            esperandoDecision: false,
            esperandoSustitucion: null,
            timer: null,
            animP1: "",
            animP2: ""
        };

        async function cargarUsuarios() {
            try {
                const snapshot = await get(ref(db, "/"));
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    window.state.usuarios = data.usuarios || data;
                    render();
                }
            } catch (error) { console.error(error); }
        }

        window.iniciarSeleccion = () => {
            const u1 = document.getElementById('sel-p1').value;
            const u2 = document.getElementById('sel-p2').value;
            if (!u1 || !u2 || u1 === u2) return alert("Selecciona dos jugadores distintos");
            window.state.p1.name = u1;
            window.state.p2.name = u2;
            window.state.p1.deck = obtenerCartasAleatorias(u1, 8);
            window.state.p2.deck = obtenerCartasAleatorias(u2, 8);
            window.state.fase = "seleccion";
            render();
        };

        function obtenerCartasAleatorias(userName, cantidad) {
            const user = window.state.usuarios[userName];
            const coleccion = user.coleccion;
            const disponibles = Object.keys(coleccion).filter(c => coleccion[c] > 0);
            return disponibles.sort(() => 0.5 - Math.random()).slice(0, cantidad).map(id => ({
                id,
                ...(statsCartas[id] || statsCartas.default),
                currentHp: (statsCartas[id] || statsCartas.default).hp
            }));
        }

        window.seleccionarCarta = (playerNum, cardIdx) => {
            const player = playerNum === 1 ? window.state.p1 : window.state.p2;
            if (player.hand.length >= 3) return;
            player.hand.push(player.deck.splice(cardIdx, 1)[0]);
            if (window.state.p1.hand.length === 3 && window.state.p2.hand.length === 3) {
                iniciarCombate();
            } else { render(); }
        };

        function iniciarCombate() {
            window.state.fase = "combate";
            window.state.p1.active = window.state.p1.hand.shift();
            window.state.p2.active = window.state.p2.hand.shift();
            window.state.turno = window.state.p1.active.pes >= window.state.p2.active.pes ? 1 : 2;
            render();
            log(`¡Empieza ${window.state.turno === 1 ? window.state.p1.name : window.state.p2.name}!`);
            planificarSiguienteTurno();
        }

        function planificarSiguienteTurno() {
            if (window.state.ganador || window.state.esperandoSustitucion) return;
            const jugadorActual = window.state.turno === 1 ? window.state.p1 : window.state.p2;

            // Modificación: Solo entra en modo decisión si tiene menos de 20 HP Y tiene cartas para cambiar
            if (jugadorActual.active.currentHp < 20 && jugadorActual.hand.length > 0) {
                window.state.esperandoDecision = true;
                log(`⚠️ ${jugadorActual.name} en crítico. ¿Cambiar o Atacar?`);
                render();
                return;
            }

            // Si es su última carta o tiene mucha vida, ataca automáticamente
            window.state.timer = setTimeout(() => {
                window.accion('atacar');
            }, 1800);
        }

        window.abrirMenuCambio = () => {
            window.state.esperandoSustitucion = window.state.turno;
            window.state.esperandoDecision = false;
            render();
        };

        window.accion = (tipo) => {
            const t = window.state.turno;
            const ataca = t === 1 ? window.state.p1 : window.state.p2;
            const defiende = t === 1 ? window.state.p2 : window.state.p1;

            if (tipo === 'atacar') {
                if(t === 1) { window.state.animP1 = "anim-atk-p1"; window.state.animP2 = "anim-hit"; }
                else { window.state.animP2 = "anim-atk-p2"; window.state.animP1 = "anim-hit"; }

                const vAtk = Math.floor(Math.random() * (ataca.active.atk/2 + 1)) + ataca.active.atk/2;
                const vDef = Math.floor(Math.random() * (defiende.active.def/2 + 1)) + defiende.active.def/2;
                const daño = Math.max(0, Math.floor(vAtk - vDef));
                defiende.active.currentHp -= daño;
                log(`${ataca.name} infligió ${daño} de daño.`);
            }

            window.state.esperandoDecision = false;
            render();

            setTimeout(() => {
                window.state.animP1 = "";
                window.state.animP2 = "";
                
                if (defiende.active.currentHp <= 0) {
                    defiende.active.currentHp = 0;
                    ataca.bajas++;
                    log(`💀 ${defiende.active.id} ha caído.`);
                    
                    if (defiende.hand.length > 0) {
                        window.state.esperandoSustitucion = (t === 1 ? 2 : 1);
                        render();
                    } else {
                        window.state.ganador = ataca.name;
                        render();
                    }
                } else {
                    window.state.turno = (t === 1 ? 2 : 1);
                    render();
                    planificarSiguienteTurno();
                }
            }, 600);
        };

        window.sustituirCarta = (cardIdx) => {
            const playerNum = window.state.esperandoSustitucion;
            const player = playerNum === 1 ? window.state.p1 : window.state.p2;
            
            if (player.active.currentHp > 0) {
                player.hand.push(player.active);
            }

            player.active = player.hand.splice(cardIdx, 1)[0];
            window.state.esperandoSustitucion = null;
            window.state.turno = (playerNum === 1 ? 2 : 1);
            
            log(`${player.name} ha sacado a ${player.active.id}.`);
            render();
            planificarSiguienteTurno();
        };

        function log(m) {
            const l = document.getElementById('log');
            if(l) l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
        }

        window.render = () => {
            const appDiv = document.getElementById('app');
            
            if (window.state.fase === "menu") {
                let options = Object.keys(window.state.usuarios).map(u => `<option value="${u}">${u}</option>`).join('');
                appDiv.innerHTML = `
                    <div class="main-menu fade-in">
                        <div class="logo-area">
                            <h1 class="glitch-text">GARFICARTAS</h1>
                            <p class="subtitle">EL JUEGO OFICIAL</p>
                        </div>
                        <div class="selection-container">
                            <div class="player-select">
                                <label>JUGADOR 1</label>
                                <select id="sel-p1">${options}</select>
                            </div>
                            <div class="vs-label">VS</div>
                            <div class="player-select">
                                <label>JUGADOR 2</label>
                                <select id="sel-p2">${options}</select>
                            </div>
                        </div>
                        <button class="btn-start" onclick="iniciarSeleccion()">PREPARAR EQUIPOS</button>
                    </div>`;
            } 
            else if (window.state.fase === "seleccion") {
                const p1h = window.state.p1.hand.length;
                const p2h = window.state.p2.hand.length;
                appDiv.innerHTML = `
                    <div class="draft-screen fade-in">
                        <div class="draft-header">
                            <h2>SELECCIÓN DE EQUIPO</h2>
                            <p>Pasa el ratón para ver stats. Elegid 3 cartas cada uno.</p>
                        </div>
                        <div class="draft-container">
                            <div class="draft-side p1-side">
                                <h3 class="${p1h < 3 ? 'pulse' : ''}">${window.state.p1.name} (${p1h}/3)</h3>
                                <div class="card-grid">
                                    ${window.state.p1.deck.map((c,i)=>`
                                        <div class="card-wrapper zoom-p1" onclick="seleccionarCarta(1,${i})">
                                            <img src="${URL_BASE}${c.id}.png">
                                            <div class="card-stats">ATK:${c.atk} HP:${c.hp}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="draft-side p2-side">
                                <h3 class="${p2h < 3 ? 'pulse' : ''}">${window.state.p2.name} (${p2h}/3)</h3>
                                <div class="card-grid">
                                    ${window.state.p2.deck.map((c,i)=>`
                                        <div class="card-wrapper zoom-p2" onclick="seleccionarCarta(2,${i})">
                                            <img src="${URL_BASE}${c.id}.png">
                                            <div class="card-stats">ATK:${c.atk} HP:${c.hp}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;
            } 
            else {
                const {p1, p2, turno, ganador, esperandoDecision, esperandoSustitucion, animP1, animP2} = window.state;
                appDiv.innerHTML = `
                    <div class="combat-screen">
                        <div class="scoreboard">
                            <div class="score-box p1-color"><span>${p1.name}</span><span class="score-number">${p1.bajas}</span></div>
                            <div class="score-vs">BATALLA</div>
                            <div class="score-box p2-color"><span class="score-number">${p2.bajas}</span><span>${p2.name}</span></div>
                        </div>
                        <div class="arena">
                            <div class="card-area">
                                <div class="card ${turno===1?'active':''} ${animP1} ${p1.active.currentHp<=0?'dead':''}">
                                    <img src="${URL_BASE}${p1.active.id}.png">
                                    <div class="hp-bar-container"><div class="hp-bar" style="width: ${(p1.active.currentHp/p1.active.hp)*100}%"></div></div>
                                    <div class="hp-text">${p1.active.currentHp} / ${p1.active.hp} HP</div>
                                    ${esperandoDecision && turno === 1 ? `
                                        <div class="decision-box">
                                            ${p1.hand.length > 0 ? `<button class="btn-swap" onclick="abrirMenuCambio()">CAMBIAR</button>` : ''}
                                            <button class="btn-atk" onclick="accion('atacar')">ATACAR</button>
                                        </div>`:''}
                                </div>
                                ${esperandoSustitucion === 1 ? `<div class="substitution-menu"><p>ELIGE SUSTITUTO</p><div class="sub-list">${p1.hand.map((c,i) => `<img src="${URL_BASE}${c.id}.png" onclick="sustituirCarta(${i})">`).join('')}</div></div>` : ''}
                            </div>
                            <div class="card-area">
                                <div class="card ${turno===2?'active':''} ${animP2} ${p2.active.currentHp<=0?'dead':''}">
                                    <img src="${URL_BASE}${p2.active.id}.png">
                                    <div class="hp-bar-container"><div class="hp-bar" style="width: ${(p2.active.currentHp/p2.active.hp)*100}%"></div></div>
                                    <div class="hp-text">${p2.active.currentHp} / ${p2.active.hp} HP</div>
                                    ${esperandoDecision && turno === 2 ? `
                                        <div class="decision-box">
                                            ${p2.hand.length > 0 ? `<button class="btn-swap" onclick="abrirMenuCambio()">CAMBIAR</button>` : ''}
                                            <button class="btn-atk" onclick="accion('atacar')">ATACAR</button>
                                        </div>`:''}
                                </div>
                                ${esperandoSustitucion === 2 ? `<div class="substitution-menu"><p>ELIGE SUSTITUTO</p><div class="sub-list">${p2.hand.map((c,i) => `<img src="${URL_BASE}${c.id}.png" onclick="sustituirCarta(${i})">`).join('')}</div></div>` : ''}
                            </div>
                        </div>
                        <div class="status-footer">
                            ${ganador ? `<h1 class="win-text">👑 ¡${ganador} GANA LA PARTIDA! 🏆</h1><button class="btn-start" onclick="location.reload()">NUEVA PARTIDA</button>` : 
                            (esperandoSustitucion ? `<h2 class="status-msg substitution">ESPERANDO REFUERZOS...</h2>` : 
                            (esperandoDecision ? `<h2 class="status-msg critical">¡DECISIÓN CRÍTICA!</h2>` : `<p class="status-msg auto">COMBATE AUTOMÁTICO EN CURSO...</p>`))}
                        </div>
                    </div>`;
            }
        };

        cargarUsuarios();
    </script>
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #ff00ff;
            --bg: #0a0b10;
            --card-bg: #161b22;
            --p1: #00d2ff;
            --p2: #ff0055;
        }

        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #1a1f35 0%, #0a0b10 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .main-menu {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .glitch-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: var(--primary);
            text-shadow: 2px 2px var(--secondary), -2px -2px #00fff2;
            margin: 0;
        }

        .subtitle { color: rgba(255,255,255,0.5); letter-spacing: 8px; font-size: 0.9rem; margin-bottom: 40px; }

        .selection-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 40px;
        }

        .player-select { display: flex; flex-direction: column; gap: 10px; }
        .player-select label { color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        
        select {
            padding: 12px 20px;
            background: #1a1a1a;
            color: white;
            border: 1px solid var(--primary);
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
        }

        .vs-label { font-size: 2rem; font-weight: 900; font-style: italic; color: var(--secondary); }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-start:hover { background: var(--primary); color: black; box-shadow: 0 0 20px var(--primary); }

        .draft-screen { max-width: 1200px; margin: 0 auto; }
        .draft-container { display: flex; gap: 40px; justify-content: center; margin-top: 30px; }
        .draft-side { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; width: 45%; }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card-wrapper {
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
            background: transparent;
        }
        
        .card-wrapper img { 
            width: 100%; 
            border-radius: 8px; 
            border: 2px solid transparent; 
            display: block;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }
        
        .card-wrapper:hover { z-index: 100; }
        .card-wrapper:hover img {
            transform: scale(2.5) translateY(-15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
        }
        
        .zoom-p1:hover img { border-color: var(--p1); box-shadow: 0 0 25px var(--p1), 0 20px 40px rgba(0,0,0,0.9); }
        .zoom-p2:hover img { border-color: var(--p2); box-shadow: 0 0 25px var(--p2), 0 20px 40px rgba(0,0,0,0.9); }

        .card-wrapper:hover .card-stats { opacity: 0; }
        .card-stats { font-size: 0.6rem; color: #aaa; margin-top: 5px; transition: 0.2s; pointer-events: none; }

        .combat-screen { max-width: 1000px; margin: 0 auto; }
        .arena { display: flex; justify-content: center; gap: 60px; margin-top: 30px; align-items: flex-start; }
        
        .card { 
            padding: 15px; 
            border: 2px solid #333; 
            border-radius: 15px; 
            background: var(--card-bg); 
            width: 250px; 
            transition: 0.3s; 
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(0,255,204,0.2); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }

        .hp-bar-container { background: #000; height: 10px; border-radius: 5px; margin-bottom: 5px; overflow: hidden; }
        .hp-bar { background: linear-gradient(90deg, #ff0055, #ff4444); height: 100%; transition: 0.5s ease-out; }
        .hp-text { font-size: 0.9rem; font-weight: bold; color: #ff4444; }

        .substitution-menu {
            margin-top: 15px;
            background: rgba(0,255,255,0.05);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--primary);
        }
        .sub-list { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .sub-list img { width: 60px; cursor: pointer; border-radius: 5px; border: 1px solid transparent; }
        .sub-list img:hover { border-color: var(--primary); transform: scale(1.1); }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 50px;
            border-radius: 100px;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }
        .score-box { display: flex; align-items: center; gap: 20px; font-weight: 900; font-size: 1.5rem; }
        .score-number { font-size: 3rem; }
        .p1-color { color: var(--p1); }
        .p2-color { color: var(--p2); }

        #log { 
            width: 100%; max-width: 600px; height: 100px; overflow-y: auto; 
            background: rgba(0,0,0,0.5); color: #888; margin: 30px auto; 
            padding: 15px; border-radius: 10px; text-align: left; font-family: 'Courier New', monospace;
            font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-swap { background: #00d2ff; color: black; border: none; padding: 10px; width: 100%; margin-top: 5px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .btn-atk { background: #ff3366; color: white; border: none; padding: 10px; width: 100%; margin-top: 5px; font-weight: bold; border-radius: 5px; cursor: pointer; }

        .status-msg { margin-top: 20px; text-transform: uppercase; letter-spacing: 3px; }
        .critical { color: var(--secondary); animation: blink 0.5s infinite; }
        .auto { color: #555; font-size: 0.8rem; }
        
        @keyframes blink { 50% { opacity: 0; } }

        .anim-atk-p1 { animation: atk-p1 0.4s ease-in-out; }
        .anim-atk-p2 { animation: atk-p2 0.4s ease-in-out; }
        .anim-hit { animation: hit 0.3s ease; }

        @keyframes atk-p1 { 0% { transform: translateX(0); } 30% { transform: translateX(60px) rotate(5deg); } 100% { transform: translateX(0); } }
        @keyframes atk-p2 { 0% { transform: translateX(0); } 30% { transform: translateX(-60px) rotate(-5deg); } 100% { transform: translateX(0); } }
        @keyframes hit { 0% { transform: scale(1); } 20% { transform: scale(0.9) rotate(2deg); background: #400; } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="log">SISTEMA INICIALIZADO...</div>
</body>
</html>
